name: CI command trigger

# PR-comment-driven dispatch to a GitLab pipeline.
#
# Why issue_comment + this YAML at all?
#   The actual validation/fuzz pipeline runs on self-hosted GitLab runners
#   we control. We DO NOT want PR authors to be able to run arbitrary code
#   on those runners. issue_comment-triggered GitHub workflows ALWAYS run
#   from the default branch's copy of this YAML (regardless of which branch
#   the comment is on), so a PR cannot modify this file to escape -- the
#   only attack surface is "can a maintainer be tricked into typing
#   /ci run on a malicious PR", which is the same threat model as the
#   manual GitLab UI trigger.
#
# Required secrets in this repo:
#   GITLAB_TRIGGER_TOKEN  — pipeline trigger token from the mirror project's
#                           CI/CD settings on git.mooinglemur.com.
#   BOT_PAT               — fine-grained PAT scoped to ionium-ap/Archipelago-index
#                           with: Pull requests:    Read       (head-SHA lookup)
#                                 Issues:           Read+Write (post reactions)
#                                 Commit statuses:  Read+Write (pre-post pending statuses)
#                           Used in place of GITHUB_TOKEN because the org-level
#                           Actions policy caps GITHUB_TOKEN's perms below
#                           issues:write regardless of the workflow's
#                           `permissions:` declaration.

on:
  issue_comment:
    types: [created]

permissions:
  # All GitHub API calls go through BOT_PAT, so GITHUB_TOKEN only needs the
  # default read-only access.
  contents: read

env:
  # URL-encoded project path so we don't have to track the numeric ID.
  GITLAB_PIPELINE_TRIGGER_URL: https://git.mooinglemur.com/api/v4/projects/ionium-ap%2Farchipelago-index/trigger/pipeline

jobs:
  dispatch:
    # issue_comment fires for both issues and PR conversations; only act on PRs.
    if: ${{ github.event.issue.pull_request != null }}
    runs-on: ubuntu-latest
    steps:
      - id: parse
        name: Parse /ci command and authorize
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            const body = (context.payload.comment.body || '');
            // Match /ci run or /ci fuzz at the start of any line. We match
            // \b after the subcommand so future args (`/ci fuzz only=alttp`)
            // can extend without regex churn.
            const m = body.match(/^\s*\/ci\s+(run|fuzz)\b/m);
            if (!m) {
              core.setOutput('skip', 'true');
              return;
            }

            const assoc = context.payload.comment.author_association;
            const authorized = ['OWNER', 'MEMBER', 'COLLABORATOR'].includes(assoc);
            if (!authorized) {
              core.warning(`Ignoring /ci from author_association=${assoc}`);
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: '-1',
              });
              core.setOutput('skip', 'true');
              return;
            }

            // Resolve the PR head SHA (the comment payload doesn't include it).
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number,
            });

            // 👀 = "received, working on it"
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

            core.setOutput('skip', 'false');
            core.setOutput('mode', m[1]);
            core.setOutput('pr_number', String(context.payload.issue.number));
            core.setOutput('sha', pr.data.head.sha);
            core.setOutput('comment_id', String(context.payload.comment.id));

      - name: Trigger GitLab pipeline
        if: steps.parse.outputs.skip == 'false'
        env:
          TOKEN: ${{ secrets.GITLAB_TRIGGER_TOKEN }}
          MODE: ${{ steps.parse.outputs.mode }}
          PR_NUMBER: ${{ steps.parse.outputs.pr_number }}
          SHA: ${{ steps.parse.outputs.sha }}
        run: |
          set -e
          response=$(curl -fsS -X POST \
            -F "token=$TOKEN" \
            -F "ref=main" \
            -F "variables[MODE]=$MODE" \
            -F "variables[GITHUB_PR]=$PR_NUMBER" \
            -F "variables[GITHUB_SHA]=$SHA" \
            "$GITLAB_PIPELINE_TRIGGER_URL")
          echo "$response" | jq .
          web_url=$(echo "$response" | jq -r '.web_url // empty')
          # Fail the step if GitLab didn't return a pipeline URL (e.g., 200
          # with an unexpected error body). That way `success()` further
          # down the workflow really means "we have a live pipeline to
          # post pending statuses for".
          if [ -z "$web_url" ]; then
            echo "::error::GitLab trigger response had no web_url; treating as failure"
            exit 1
          fi
          echo "PIPELINE_URL=$web_url" >> "$GITHUB_ENV"

      - name: Pre-post pending statuses
        if: steps.parse.outputs.skip == 'false' && success()
        uses: actions/github-script@v7
        env:
          SHA: ${{ steps.parse.outputs.sha }}
          MODE: ${{ steps.parse.outputs.mode }}
          # PIPELINE_URL inherited from the prior step via $GITHUB_ENV.
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            // Pre-stage `state=pending` commit statuses so the PR's checks
            // section shows "in progress" rows the moment we trigger the
            // GitLab pipeline. Each GitLab job's `report_to_github`
            // after_script overwrites its row with success/failure when
            // it completes. Keep this list in sync with the jobs in
            // index-validate.yml that have `<<: *report_to_github` and a
            // `$MODE == "run" || $MODE == "fuzz"` rule (or `"fuzz"` alone
            // for fuzz-only jobs).
            const mode = process.env.MODE;
            const sha = process.env.SHA;
            const pipelineUrl = process.env.PIPELINE_URL;
            const base = [
              'diff', 'check', 'verify-index', 'verify-apworlds',
              'apdiff', 'comment-diff', 'network-audit',
            ];
            const fuzzOnly = mode === 'fuzz' ? ['fuzz'] : [];
            const contexts = [...base, ...fuzzOnly].map(c => `gitlab/${c}`);

            for (const ctx of contexts) {
              try {
                await github.rest.repos.createCommitStatus({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  sha,
                  state: 'pending',
                  context: ctx,
                  description: 'queued on GitLab',
                  target_url: pipelineUrl,
                });
              } catch (e) {
                core.warning(`failed to pre-post pending status for ${ctx}: ${e.message}`);
              }
            }

      - name: React with rocket
        if: steps.parse.outputs.skip == 'false' && success()
        uses: actions/github-script@v7
        env:
          COMMENT_ID: ${{ steps.parse.outputs.comment_id }}
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            // 🚀 = "pipeline kicked off"
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: parseInt(process.env.COMMENT_ID, 10),
              content: 'rocket',
            });

      - name: React with confused on failure
        if: steps.parse.outputs.skip == 'false' && failure()
        uses: actions/github-script@v7
        env:
          COMMENT_ID: ${{ steps.parse.outputs.comment_id }}
        with:
          github-token: ${{ secrets.BOT_PAT }}
          script: |
            // 😕 = "tried to trigger but it didn't work; check Actions log"
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: parseInt(process.env.COMMENT_ID, 10),
              content: 'confused',
            });
